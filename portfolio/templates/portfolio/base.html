<!-- portfolio/templates/portfolio/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; color: #1d1d1f; }
        header { background: #1d1d1f; color: white; padding: 20px 40px; }
        header h1 { font-size: 1.5em; }
        nav { margin-top: 8px; }
        nav a { color: #a1a1a6; margin-right: 20px; text-decoration: none; font-size: 0.9em; }
        nav a:hover { color: white; }
        main { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .btn { display: inline-block; background: #0071e3; color: white; padding: 10px 20px; 
               border-radius: 8px; text-decoration: none; border: none; cursor: pointer; font-size: 1em; }
        .btn:hover { background: #0077ed; }
        .btn-danger { background: #ff3b30; }
        .btn-secondary { background: #86868b; }
        footer { text-align: center; padding: 20px; color: #86868b; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <h1>Portfolio - Filipe Monteiro</h1>
        <nav>
            <a href="{% url 'portfolio:lista_projetos' %}">Projetos</a>
            <a href="{% url 'portfolio:lista_tecnologias' %}">Tecnologias</a>
            <a href="{% url 'portfolio:lista_competencias' %}">Competências</a>
            <a href="{% url 'portfolio:lista_formacoes' %}">Formações</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>© 2026</footer>
</body>
</html>
